<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界史时间轴 · 国际体系演变（1500–2026）</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --ink: #c9d1d9;
    --muted: #8b949e;
    --axis: #30363d;
    --axis-dot: #58a6ff;
    --pol: #2ecc71;
    --econ: #3498db;
    --culture: #f39c12;
    --colony: #e74c3c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden; /* 锁死纵向滚动，全屏沉浸 */
  }

  .header {
    text-align: center;
    padding: 0.8rem 1rem 0.4rem;
    background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--axis);
  }
  .header h1 {
    font-size: 1.4rem;
    font-weight: 800;
    color: #fff;
    margin-bottom: 0.1rem;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 0.3rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  .control-panel {
    background: var(--bg-card);
    border-bottom: 1px solid var(--axis);
    padding: 0.4rem 1rem;
  }
  .filter-bar, .minimap-bar {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.2rem 0;
  }
  
  .filter-btn, .mini-nav-btn {
    background: transparent;
    border: 1px solid var(--axis);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 4px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .mini-nav-btn:hover { border-color: var(--ink); color: var(--ink); }
  .filter-btn.active { color: #fff; border-color: transparent; }
  .filter-btn.active[data-cat="all"] { background: #555; }
  .filter-btn.active[data-cat="pol"] { background: var(--pol); }
  .filter-btn.active[data-cat="econ"] { background: var(--econ); }
  .filter-btn.active[data-cat="culture"] { background: var(--culture); }
  .filter-btn.active[data-cat="colony"] { background: var(--colony); }

  .timeline-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    /* 🛠️ 核心修正：自适应屏幕高度，防止上下需要滚动 */
    height: calc(100vh - 150px);
    background: var(--bg);
    cursor: grab;
    position: relative;
  }
  .timeline-wrapper:active { cursor: grabbing; }
  .timeline-wrapper::-webkit-scrollbar { height: 8px; }
  .timeline-wrapper::-webkit-scrollbar-track { background: var(--bg); }
  .timeline-wrapper::-webkit-scrollbar-thumb { background: var(--axis); border-radius: 4px; }

  .timeline {
    position: relative;
    width: 11000px;
    height: 100%; /* 满高 */
    margin: 0 auto;
    user-select: none;
  }

  .era-band {
    position: absolute;
    height: 100%;
    top: 0;
    z-index: 0;
    border-right: 1px dashed rgba(48, 54, 61, 0.3);
  }
  .era-label {
    position: absolute;
    top: 6px;
    height: 24px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    z-index: 1;
    white-space: nowrap;
    padding: 0 10px;
  }

  .main-axis {
    position: absolute;
    left: 80px;
    right: 80px;
    top: 50%; /* 🛠️ 核心修正：主轴永远锁定在屏幕垂直正中央 */
    height: 2px;
    background: var(--axis);
    z-index: 2;
  }

  .year-marker {
    position: absolute;
    top: calc(50% - 10px);
    transform: translateX(-50%);
    z-index: 3;
    text-align: center;
  }
  .year-marker .tick {
    width: 1px;
    height: 20px;
    background: var(--axis);
    margin: 0 auto;
  }
  .year-marker.major .tick { height: 24px; width: 1.5px; background: #666; }
  .year-marker .label {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .year-marker.major .label { color: var(--ink); font-weight: 700; }

  .event-card {
    position: absolute;
    z-index: 5;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.15s;
  }
  .event-card:hover {
    transform: translateX(-50%) scale(1.05) !important;
    z-index: 20;
  }
  .event-card.hidden {
    opacity: 0.05;
    pointer-events: none;
  }

  .card-body {
    background: var(--bg-card);
    border-radius: 3px;
    padding: 4px 6px;
    width: 145px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.4);
    border: 1px solid rgba(48,54,61,0.8);
  }

  .card-year { font-size: 0.6rem; font-weight: 700; line-height: 1; }
  .card-title {
    font-size: 0.68rem;
    font-weight: 500;
    line-height: 1.3;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-card.pol .card-body { border-left: 3px solid var(--pol); }
  .event-card.pol .card-year { color: var(--pol); }
  .event-card.econ .card-body { border-left: 3px solid var(--econ); }
  .event-card.econ .card-year { color: var(--econ); }
  .event-card.culture .card-body { border-left: 3px solid var(--culture); }
  .event-card.culture .card-year { color: var(--culture); }
  .event-card.colony .card-body { border-left: 3px solid var(--colony); }
  .event-card.colony .card-year { color: var(--colony); }

  .connector {
    position: absolute;
    left: 50%;
    width: 1px;
    transform: translateX(-50%);
    z-index: 3;
  }
  .axis-dot {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
  }

  .tooltip {
    position: fixed;
    background: #1c2128;
    border: 1px solid var(--axis);
    border-radius: 6px;
    padding: 10px 14px;
    max-width: 320px;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .tooltip.visible { opacity: 1; display: block; }
  .tooltip .tt-cat { display: inline-block; font-size: 0.65rem; font-weight: 700; color: #fff; padding: 1px 5px; border-radius: 2px; margin-bottom: 4px; }
  .tooltip .tt-year { font-size: 0.7rem; color: var(--muted); }
  .tooltip .tt-title { font-size: 0.88rem; font-weight: 700; margin: 3px 0; color: #fff; }
  .tooltip .tt-desc { font-size: 0.82rem; color: #adbac7; line-height: 1.45; }
  .tooltip.pol .tt-cat { background: var(--pol); }
  .tooltip.econ .tt-cat { background: var(--econ); }
  .tooltip.culture .tt-cat { background: var(--culture); }
  .tooltip.colony .tt-cat { background: var(--colony); }
</style>
</head>

<div class="header">

    <div class="legend-item"><span class="legend-dot" style="background:var(--colony)"></span>殖民/国际关系</div>
  </div>
</div>

<div class="control-panel">

    <button class="filter-btn" data-cat="econ">经济</button>
    <button class="filter-btn" data-cat="culture">文化</button>
    <button class="filter-btn" data-cat="colony">殖民/国关</button>

  <div class="minimap-bar" id="minimapBar"></div>
</div>

<div class="timeline-wrapper" id="timelineWrapper">
  <div class="timeline" id="timeline">
    <div class="main-axis"></div>
  </div>
</div>

<div class="tooltip" id="tooltip">

  <div class="tt-year" id="ttYear"></div>
  <div class="tt-title" id="ttTitle"></div>

// ==================== 渲染与交互 ====================
const TIMELINE_START = 1500;
const TIMELINE_END = 2026;
const PX_LEFT = 100;
const PX_RIGHT = 10800;
const LAYER_HEIGHT = 36;

const timeline = document.getElementById('timeline');
const wrapper = document.getElementById('timelineWrapper');
const tooltip = document.getElementById('tooltip');
const minimapBar = document.getElementById('minimapBar');
const catNames = { pol: '政治', econ: '经济', culture: '文化', colony: '殖民/国际关系' };

function yearToX(year) {
  return PX_LEFT + (year - TIMELINE_START) / (TIMELINE_END - TIMELINE_START) * (PX_RIGHT - PX_LEFT);
}

// 获取实时的中心轴 Y 轴坐标（基于弹性视口）
function getAxisY() {
  return timeline.offsetHeight / 2;
}

window.erasData.forEach(era => {
  const band = document.createElement('div');
  band.className = 'era-band';
  band.style.left = yearToX(era.start) + 'px';
  band.style.width = (yearToX(era.end) - yearToX(era.start)) + 'px';
  band.style.background = `rgba(${hexToRgb(era.color)},0.04)`;
  timeline.appendChild(band);

  const label = document.createElement('div');
  label.className = 'era-label';
  label.style.left = yearToX(era.start) + 'px';
  label.style.width = (yearToX(era.end) - yearToX(era.start)) + 'px';
  label.style.background = `rgba(${hexToRgb(era.color)},0.65)`;
  label.textContent = era.name;
  timeline.appendChild(label);

  const navBtn = document.createElement('button');
  navBtn.className = 'mini-nav-btn';
  navBtn.style.borderLeft = `3px solid ${era.color}`;
  navBtn.textContent = era.name;
  navBtn.addEventListener('click', () => {
    const targetX = yearToX(era.start) - 150;
    wrapper.scrollTo({ left: targetX, behavior: 'smooth' });
  });
  minimapBar.appendChild(navBtn);
});

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

for (let y = 1500; y <= 2026; y += 25) {
  const marker = document.createElement('div');
  marker.className = 'year-marker' + (y % 100 === 0 ? ' major' : '');
  marker.style.left = yearToX(y) + 'px';
  marker.innerHTML = `<div class="tick"></div><div class="label">${y}</div>`;
  timeline.appendChild(marker);
}

function placeEvents(eventList, isAbove) {
  const placed = [];
  const axisY = getAxisY();

  eventList.forEach((evt) => {
    const [year, title, desc, cat] = evt;
    const x = yearToX(year);

    let layer = 0;
    let found = false;
    while (!found && layer < 45) {
      found = true;
      const testY = isAbove
        ? axisY - 15 - (layer + 1) * LAYER_HEIGHT
        : axisY + 15 + layer * LAYER_HEIGHT;

      for (const p of placed) {
        const overlapX = Math.abs(p.x - x) < 165; // CARD_WIDTH + GAP
        const overlapY = Math.abs(p.y - testY) < LAYER_HEIGHT;
        if (overlapX && overlapY) {
          found = false;
          layer++;
          break;
        }
      }
    }

    const y = isAbove
      ? axisY - 15 - (layer + 1) * LAYER_HEIGHT
      : axisY + 15 + layer * LAYER_HEIGHT;

    const card = document.createElement('div');
    card.className = `event-card ${cat}`;
    card.dataset.cat = cat;
    card.style.left = x + 'px';
    card.style.top = y + 'px';
    card.style.transform = 'translateX(-50%)';

    const cardHeight = 24; 
    if (isAbove) {
      const connectorH = Math.abs(axisY - (y + cardHeight));
      card.innerHTML = `
        <div class="card-body">
          <div class="card-year">${year} <span style="font-weight:normal;color:var(--muted)">${catNames[cat].slice(0,2)}</span></div>
          <div class="card-title">${title}</div>
        </div>
        <div class="connector" style="top: 100%; height: ${connectorH}px; border-left: 1px dotted var(--${cat}); opacity: 0.4;"></div>
        <div class="axis-dot" style="bottom: -${connectorH + 2.5}px; background: var(--${cat});"></div>
      `;
    } else {
      const connectorH = Math.abs(y - axisY);
      card.innerHTML = `
        <div class="card-body">
          <div class="card-year">${year} <span style="font-weight:normal;color:var(--muted)">${catNames[cat].slice(0,2)}</span></div>
          <div class="card-title">${title}</div>
        </div>
        <div class="connector" style="bottom: 100%; height: ${connectorH}px; border-left: 1px dotted var(--${cat}); opacity: 0.4;"></div>
        <div class="axis-dot" style="top: -${connectorH + 2.5}px; background: var(--${cat});"></div>
      `;
    }

    const showTT = (e) => {
      tooltip.className = `tooltip visible ${cat}`;
      document.getElementById('ttCat').textContent = catNames[cat];
      document.getElementById('ttYear').textContent = year + '年';
      document.getElementById('ttTitle').textContent = title;
      document.getElementById('ttDesc').textContent = desc;
      moveTooltip(e);
    };

    card.addEventListener('mouseenter', showTT);
    card.addEventListener('click', showTT);
    card.addEventListener('mousemove', moveTooltip);
    card.addEventListener('mouseleave', () => { tooltip.classList.remove('visible'); });

    timeline.appendChild(card);
    placed.push({ x: x, y: y });
  });
}

function moveTooltip(e) {
  let clientX = e.clientX || (e.touches && e.touches[0].clientX);
  let clientY = e.clientY || (e.touches && e.touches[0].clientY);
  if(!clientX) return;
  const x = Math.min(clientX + 15, window.innerWidth - 340);
  const y = Math.min(clientY + 15, window.innerHeight - 180);
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

// 延迟渲染以确保撑开容器
setTimeout(() => {
  const polEvents = window.historyEvents.filter(e => e[3] === 'pol').sort((a, b) => a[0] - b[0]);
  const belowEvents = window.historyEvents.filter(e => e[3] !== 'pol').sort((a, b) => a[0] - b[0]);
  placeEvents(polEvents, true);  
  placeEvents(belowEvents, false); 
}, 50);

const filterBtns = document.querySelectorAll('.filter-btn');
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    document.querySelectorAll('.event-card').forEach(card => {
      if (cat === 'all' || card.dataset.cat === cat) {
        card.classList.remove('hidden');
      } else {
        card.classList.add('hidden');
      }
    });
  });
});

wrapper.addEventListener('wheel', (e) => {
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    wrapper.scrollLeft += e.deltaY * 1.2;
  }
}, { passive: false });

let isDown = false, startX, scrollLeft;
wrapper.addEventListener('mousedown', (e) => {
  isDown = true; wrapper.style.cursor = 'grabbing';
  startX = e.pageX - wrapper.offsetLeft; scrollLeft = wrapper.scrollLeft;
});
wrapper.addEventListener('mouseleave', () => { isDown = false; wrapper.style.cursor = 'grab'; });
wrapper.addEventListener('mouseup', () => { isDown = false; wrapper.style.cursor = 'grab'; });
wrapper.addEventListener('mousemove', (e) => {
  if (!isDown) return; e.preventDefault();
  const x = e.pageX - wrapper.offsetLeft;
  wrapper.scrollLeft = scrollLeft - (x - startX) * 1.5;
});

let touchStartX = 0, touchScrollLeft = 0;
wrapper.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].pageX; touchScrollLeft = wrapper.scrollLeft;
}, { passive: true });
wrapper.addEventListener('touchmove', (e) => {
  const x = e.touches[0].pageX;
  wrapper.scrollLeft = touchScrollLeft + (touchStartX - x) * 1.3;
}, { passive: true });
</script>
